<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" font-family="monospace" font-size="13">
  <defs>
    <marker id="m1" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 z" fill="#818cf8"/>
    </marker>
    <marker id="m2" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="550" fill="#0f1117" rx="8"/>

  <!-- Title -->
  <text x="500" y="35" fill="#e2e8f0" font-size="20" font-weight="bold" text-anchor="middle">The Guided Conversation Method</text>
  <text x="500" y="55" fill="#64748b" font-size="11" text-anchor="middle">Martha doesn't decide for you. She frames decisions, presents tradeoffs, and records your choices.</text>

  <!-- ===== Protocol Steps (left column) ===== -->
  <rect x="30" y="80" width="440" height="340" rx="6" fill="#1e1e2e" stroke="#475569" stroke-width="1"/>
  <text x="250" y="108" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">The Protocol</text>

  <!-- Step 1 -->
  <circle cx="60" cy="145" r="15" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="60" y="150" fill="#c7d2fe" font-size="12" font-weight="bold" text-anchor="middle">1</text>
  <text x="85" y="142" fill="#c7d2fe" font-size="12" font-weight="bold">Frame a Decision</text>
  <text x="85" y="158" fill="#818cf8" font-size="10">Clear, bounded question with no ambiguity</text>

  <!-- Step 2 -->
  <circle cx="60" cy="195" r="15" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="60" y="200" fill="#c7d2fe" font-size="12" font-weight="bold" text-anchor="middle">2</text>
  <text x="85" y="192" fill="#c7d2fe" font-size="12" font-weight="bold">Present Options</text>
  <text x="85" y="208" fill="#818cf8" font-size="10">Tradeoffs as a table, not opinions. Pros AND cons.</text>

  <!-- Step 3 -->
  <circle cx="60" cy="245" r="15" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="60" y="250" fill="#c7d2fe" font-size="12" font-weight="bold" text-anchor="middle">3</text>
  <text x="85" y="242" fill="#c7d2fe" font-size="12" font-weight="bold">User Decides</text>
  <text x="85" y="258" fill="#818cf8" font-size="10">They own the choice. Never decide for them.</text>

  <!-- Step 4 -->
  <circle cx="60" cy="295" r="15" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="60" y="300" fill="#c7d2fe" font-size="12" font-weight="bold" text-anchor="middle">4</text>
  <text x="85" y="292" fill="#c7d2fe" font-size="12" font-weight="bold">Record the Decision</text>
  <text x="85" y="308" fill="#818cf8" font-size="10">Becomes a constraint on all future decisions</text>

  <!-- Step 5 -->
  <circle cx="60" cy="345" r="15" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="60" y="350" fill="#c7d2fe" font-size="12" font-weight="bold" text-anchor="middle">5</text>
  <text x="85" y="342" fill="#c7d2fe" font-size="12" font-weight="bold">Build Forward</text>
  <text x="85" y="358" fill="#818cf8" font-size="10">Each decision narrows the next decision's space</text>

  <!-- Step 6 -->
  <circle cx="60" cy="395" r="15" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="60" y="400" fill="#c7d2fe" font-size="12" font-weight="bold" text-anchor="middle">6</text>
  <text x="85" y="392" fill="#c7d2fe" font-size="12" font-weight="bold">Produce an Artifact</text>
  <text x="85" y="408" fill="#818cf8" font-size="10">Structured data, not prose. Ready for next phase.</text>

  <!-- ===== Decision Cascade (right column) ===== -->
  <rect x="500" y="80" width="480" height="340" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="740" y="108" fill="#fde68a" font-size="14" font-weight="bold" text-anchor="middle">The Decision Cascade</text>
  <text x="740" y="126" fill="#f59e0b" font-size="10" text-anchor="middle">Decisions compound. Each phase constrains the next.</text>

  <!-- Cascade visualization -->
  <!-- Setup decision -->
  <rect x="520" y="145" width="440" height="38" rx="4" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="530" y="165" fill="#fde68a" font-size="10" font-weight="bold">Setup:</text>
  <text x="590" y="165" fill="#fbbf24" font-size="10">name = "my-saas-app"</text>
  <text x="880" y="165" fill="#78716c" font-size="9" text-anchor="end">constrains scope</text>

  <!-- Arrow down (narrowing) -->
  <line x1="560" y1="183" x2="560" y2="200" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#m2)"/>

  <!-- Discovery decision (slightly narrower) -->
  <rect x="540" y="200" width="420" height="38" rx="4" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="550" y="220" fill="#fde68a" font-size="10" font-weight="bold">Discover:</text>
  <text x="618" y="220" fill="#fbbf24" font-size="10">divisions = [auth, billing, notify]</text>
  <text x="890" y="220" fill="#78716c" font-size="9" text-anchor="end">3 to design</text>

  <!-- Arrow down (narrowing) -->
  <line x1="580" y1="238" x2="580" y2="255" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#m2)"/>

  <!-- Design decision (narrower still) -->
  <rect x="560" y="255" width="400" height="45" rx="4" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="570" y="275" fill="#fde68a" font-size="10" font-weight="bold">Design(auth):</text>
  <text x="660" y="275" fill="#fbbf24" font-size="10">aggregates = [user, session, cred]</text>
  <text x="890" y="275" fill="#78716c" font-size="9" text-anchor="end">desks must cover</text>
  <text x="890" y="290" fill="#78716c" font-size="9" text-anchor="end">these aggregates</text>

  <!-- Arrow down (narrowing) -->
  <line x1="600" y1="300" x2="600" y2="317" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#m2)"/>

  <!-- Plan decision (narrowest) -->
  <rect x="580" y="317" width="380" height="45" rx="4" fill="#422006" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="590" y="337" fill="#fde68a" font-size="10" font-weight="bold">Plan(auth):</text>
  <text x="670" y="337" fill="#fbbf24" font-size="10">desks = [register, auth, ...]</text>
  <text x="890" y="337" fill="#78716c" font-size="9" text-anchor="end">exactly these desks,</text>
  <text x="890" y="352" fill="#78716c" font-size="9" text-anchor="end">in this order</text>

  <!-- Arrow down -->
  <line x1="620" y1="362" x2="620" y2="379" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#m2)"/>

  <!-- Craft (final) -->
  <rect x="600" y="379" width="360" height="30" rx="4" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="399" fill="#86efac" font-size="10" font-weight="bold">Craft:</text>
  <text x="655" y="399" fill="#4ade80" font-size="10">Template-driven code generation</text>

  <!-- ===== Bottom insight ===== -->
  <rect x="30" y="445" width="940" height="85" rx="6" fill="#1e1b3a" stroke="#818cf8" stroke-width="1"/>
  <text x="500" y="472" fill="#c7d2fe" font-size="14" font-weight="bold" text-anchor="middle">Why This Works</text>
  <text x="500" y="495" fill="#818cf8" font-size="11" text-anchor="middle">Each conversation covers ONLY that phase's decisions. Everything else is already settled.</text>
  <text x="500" y="515" fill="#6366f1" font-size="11" text-anchor="middle">No decision fatigue. No analysis paralysis. Just the next bounded question.</text>
</svg>