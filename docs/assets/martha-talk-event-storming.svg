<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="monospace" font-size="13">
  <defs>
    <marker id="a1" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 z" fill="#818cf8"/>
    </marker>
    <marker id="a2" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="#0f1117" rx="8"/>

  <!-- Title -->
  <text x="500" y="35" fill="#e2e8f0" font-size="20" font-weight="bold" text-anchor="middle">From Chaos to Clarity: Event Storming with Martha</text>
  <text x="500" y="55" fill="#64748b" font-size="11" text-anchor="middle">AI-guided domain discovery that turns ideas into bounded contexts</text>

  <!-- ===== Phase 1: Brainstorm (Chaotic) ===== -->
  <rect x="30" y="80" width="300" height="240" rx="6" fill="#1e1b3a" stroke="#818cf8" stroke-width="2"/>
  <text x="180" y="105" fill="#c7d2fe" font-size="14" font-weight="bold" text-anchor="middle">Phase 1: Brainstorm</text>
  <text x="180" y="122" fill="#6366f1" font-size="10" text-anchor="middle">Chaotic high-energy sticky posting</text>

  <!-- Scattered stickies (chaotic arrangement) -->
  <rect x="50" y="140" width="95" height="35" rx="3" fill="#fbbf24" transform="rotate(-5,97,157)"/>
  <text x="97" y="162" fill="#1c1917" font-size="9" text-anchor="middle">User Signed Up</text>

  <rect x="160" y="135" width="95" height="35" rx="3" fill="#fbbf24" transform="rotate(3,207,152)"/>
  <text x="207" y="157" fill="#1c1917" font-size="9" text-anchor="middle">Order Placed</text>

  <rect x="85" y="185" width="95" height="35" rx="3" fill="#fbbf24" transform="rotate(-2,132,202)"/>
  <text x="132" y="207" fill="#1c1917" font-size="9" text-anchor="middle">Payment Received</text>

  <rect x="200" y="180" width="95" height="35" rx="3" fill="#fbbf24" transform="rotate(6,247,197)"/>
  <text x="247" y="202" fill="#1c1917" font-size="9" text-anchor="middle">Item Shipped</text>

  <rect x="45" y="230" width="95" height="35" rx="3" fill="#fbbf24" transform="rotate(4,92,247)"/>
  <text x="92" y="252" fill="#1c1917" font-size="9" text-anchor="middle">Email Sent</text>

  <rect x="155" y="235" width="95" height="35" rx="3" fill="#fbbf24" transform="rotate(-3,202,252)"/>
  <text x="202" y="252" fill="#1c1917" font-size="9" text-anchor="middle">Invoice Created</text>

  <rect x="260" y="225" width="55" height="35" rx="3" fill="#fbbf24" transform="rotate(2,287,242)"/>
  <text x="287" y="247" fill="#1c1917" font-size="8" text-anchor="middle">Refund</text>

  <!-- Timer icon -->
  <rect x="50" y="280" width="80" height="22" rx="3" fill="#312e81" stroke="#818cf8" stroke-width="1"/>
  <text x="90" y="295" fill="#a5b4fc" font-size="9" text-anchor="middle">Timeboxed!</text>

  <!-- Arrow to Phase 2 -->
  <line x1="330" y1="200" x2="370" y2="200" stroke="#818cf8" stroke-width="2.5" marker-end="url(#a1)"/>

  <!-- ===== Phase 2: Big Picture (Structured) ===== -->
  <rect x="370" y="80" width="300" height="240" rx="6" fill="#0a1e0e" stroke="#22c55e" stroke-width="2"/>
  <text x="520" y="105" fill="#bbf7d0" font-size="14" font-weight="bold" text-anchor="middle">Phase 2: Big Picture</text>
  <text x="520" y="122" fill="#22c55e" font-size="10" text-anchor="middle">Stack, groom, cluster, name, map</text>

  <!-- Organized clusters -->
  <!-- Cluster 1: Auth -->
  <rect x="385" y="140" width="130" height="80" rx="4" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="158" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">Auth Context</text>
  <rect x="395" y="165" width="55" height="18" rx="2" fill="#fbbf24"/>
  <text x="422" y="178" fill="#1c1917" font-size="7" text-anchor="middle">Signed Up</text>
  <rect x="455" y="165" width="50" height="18" rx="2" fill="#fbbf24"/>
  <text x="480" y="178" fill="#1c1917" font-size="7" text-anchor="middle">Logged In</text>
  <rect x="395" y="188" width="55" height="18" rx="2" fill="#fbbf24"/>
  <text x="422" y="201" fill="#1c1917" font-size="7" text-anchor="middle">Verified</text>

  <!-- Cluster 2: Orders -->
  <rect x="530" y="140" width="130" height="80" rx="4" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="595" y="158" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">Orders Context</text>
  <rect x="540" y="165" width="55" height="18" rx="2" fill="#fbbf24"/>
  <text x="567" y="178" fill="#1c1917" font-size="7" text-anchor="middle">Placed</text>
  <rect x="600" y="165" width="50" height="18" rx="2" fill="#fbbf24"/>
  <text x="625" y="178" fill="#1c1917" font-size="7" text-anchor="middle">Shipped</text>
  <rect x="540" y="188" width="55" height="18" rx="2" fill="#fbbf24"/>
  <text x="567" y="201" fill="#1c1917" font-size="7" text-anchor="middle">Refunded</text>

  <!-- Cluster 3: Billing -->
  <rect x="385" y="232" width="130" height="60" rx="4" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="250" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">Billing Context</text>
  <rect x="395" y="257" width="55" height="18" rx="2" fill="#fbbf24"/>
  <text x="422" y="270" fill="#1c1917" font-size="7" text-anchor="middle">Paid</text>
  <rect x="455" y="257" width="55" height="18" rx="2" fill="#fbbf24"/>
  <text x="482" y="270" fill="#1c1917" font-size="7" text-anchor="middle">Invoiced</text>

  <!-- Fact arrows between clusters -->
  <line x1="515" y1="180" x2="530" y2="180" stroke="#4ade80" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="515" y1="262" x2="530" y2="200" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow to Phase 3 -->
  <line x1="670" y1="200" x2="710" y2="200" stroke="#4ade80" stroke-width="2.5" marker-end="url(#a2)"/>

  <!-- ===== Phase 3: Divisions Promoted ===== -->
  <rect x="710" y="80" width="270" height="240" rx="6" fill="#1a0a1e" stroke="#c084fc" stroke-width="2"/>
  <text x="845" y="105" fill="#e9d5ff" font-size="14" font-weight="bold" text-anchor="middle">Phase 3: Divisions</text>
  <text x="845" y="122" fill="#a855f7" font-size="10" text-anchor="middle">Clusters become bounded contexts</text>

  <!-- Division cards -->
  <rect x="725" y="140" width="240" height="45" rx="4" fill="#2e1065" stroke="#c084fc" stroke-width="1.5"/>
  <text x="845" y="160" fill="#e9d5ff" font-size="11" font-weight="bold" text-anchor="middle">manage_users</text>
  <text x="845" y="175" fill="#a78bfa" font-size="9" text-anchor="middle">Auth, registration, verification</text>

  <rect x="725" y="195" width="240" height="45" rx="4" fill="#2e1065" stroke="#c084fc" stroke-width="1.5"/>
  <text x="845" y="215" fill="#e9d5ff" font-size="11" font-weight="bold" text-anchor="middle">process_orders</text>
  <text x="845" y="230" fill="#a78bfa" font-size="9" text-anchor="middle">Placement, fulfillment, returns</text>

  <rect x="725" y="250" width="240" height="45" rx="4" fill="#2e1065" stroke="#c084fc" stroke-width="1.5"/>
  <text x="845" y="270" fill="#e9d5ff" font-size="11" font-weight="bold" text-anchor="middle">handle_billing</text>
  <text x="845" y="285" fill="#a78bfa" font-size="9" text-anchor="middle">Payments, invoicing, refunds</text>

  <!-- Each enters ALC -->
  <text x="845" y="310" fill="#c084fc" font-size="9" text-anchor="middle">Each division enters the</text>
  <text x="845" y="322" fill="#c084fc" font-size="9" font-weight="bold" text-anchor="middle">8-process lifecycle independently</text>

  <!-- ===== Phase Flow (bottom) ===== -->
  <rect x="30" y="345" width="940" height="130" rx="6" fill="#1e1e2e" stroke="#475569" stroke-width="1"/>
  <text x="500" y="370" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">The Big Picture Storm: 7 Phases</text>

  <!-- Phase boxes -->
  <rect x="50" y="390" width="95" height="30" rx="3" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="97" y="410" fill="#c7d2fe" font-size="10" text-anchor="middle">storm</text>

  <text x="155" y="410" fill="#475569" font-size="14" text-anchor="middle">&#x25B6;</text>

  <rect x="170" y="390" width="95" height="30" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="217" y="410" fill="#86efac" font-size="10" text-anchor="middle">stack</text>

  <text x="275" y="410" fill="#475569" font-size="14" text-anchor="middle">&#x25B6;</text>

  <rect x="290" y="390" width="95" height="30" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="337" y="410" fill="#86efac" font-size="10" text-anchor="middle">groom</text>

  <text x="395" y="410" fill="#475569" font-size="14" text-anchor="middle">&#x25B6;</text>

  <rect x="410" y="390" width="95" height="30" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="457" y="410" fill="#86efac" font-size="10" text-anchor="middle">cluster</text>

  <text x="515" y="410" fill="#475569" font-size="14" text-anchor="middle">&#x25B6;</text>

  <rect x="530" y="390" width="95" height="30" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="577" y="410" fill="#86efac" font-size="10" text-anchor="middle">name</text>

  <text x="635" y="410" fill="#475569" font-size="14" text-anchor="middle">&#x25B6;</text>

  <rect x="650" y="390" width="95" height="30" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="697" y="410" fill="#86efac" font-size="10" text-anchor="middle">map</text>

  <text x="755" y="410" fill="#475569" font-size="14" text-anchor="middle">&#x25B6;</text>

  <rect x="770" y="390" width="95" height="30" rx="3" fill="#2e1065" stroke="#c084fc" stroke-width="1.5"/>
  <text x="817" y="410" fill="#e9d5ff" font-size="10" font-weight="bold" text-anchor="middle">promoted</text>

  <!-- Phase descriptions -->
  <text x="97" y="442" fill="#818cf8" font-size="8" text-anchor="middle">Post stickies</text>
  <text x="217" y="442" fill="#4ade80" font-size="8" text-anchor="middle">Group dupes</text>
  <text x="337" y="442" fill="#4ade80" font-size="8" text-anchor="middle">Pick canonical</text>
  <text x="457" y="442" fill="#4ade80" font-size="8" text-anchor="middle">Form contexts</text>
  <text x="577" y="442" fill="#4ade80" font-size="8" text-anchor="middle">Name them</text>
  <text x="697" y="442" fill="#4ade80" font-size="8" text-anchor="middle">Draw arrows</text>
  <text x="817" y="442" fill="#c084fc" font-size="8" text-anchor="middle">Become divs</text>

  <!-- ===== AI Integration (bottom strip) ===== -->
  <rect x="30" y="500" width="940" height="80" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="65" y="528" fill="#c4b5fd" font-size="14" font-weight="bold">AI-Assisted Throughout</text>

  <rect x="280" y="512" width="180" height="28" rx="4" fill="#1e1b3a" stroke="#818cf8" stroke-width="1"/>
  <text x="370" y="531" fill="#a5b4fc" font-size="10" text-anchor="middle">Oracle Vision Chat</text>

  <rect x="480" y="512" width="180" height="28" rx="4" fill="#1e1b3a" stroke="#818cf8" stroke-width="1"/>
  <text x="570" y="531" fill="#a5b4fc" font-size="10" text-anchor="middle">Domain Expertise</text>

  <rect x="680" y="512" width="180" height="28" rx="4" fill="#1e1b3a" stroke="#818cf8" stroke-width="1"/>
  <text x="770" y="531" fill="#a5b4fc" font-size="10" text-anchor="middle">Boundary Suggestions</text>

  <text x="500" y="568" fill="#64748b" font-size="10" text-anchor="middle">Martha connects to local LLMs (Ollama) via hecate-daemon for privacy-first AI guidance</text>
</svg>