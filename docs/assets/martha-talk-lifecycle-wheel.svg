<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="monospace" font-size="13">
  <defs>
    <marker id="arw" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 z" fill="#818cf8"/>
    </marker>
    <marker id="arw-green" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 z" fill="#4ade80"/>
    </marker>
    <marker id="arw-amber" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#0f1117" rx="8"/>

  <!-- Title -->
  <text x="500" y="35" fill="#e2e8f0" font-size="20" font-weight="bold" text-anchor="middle">The Application Lifecycle Wheel</text>
  <text x="500" y="55" fill="#64748b" font-size="12" text-anchor="middle">Every division cycles through 8 processes. Each process is a first-class citizen.</text>

  <!-- Center hub -->
  <circle cx="500" cy="350" r="60" fill="#1e1b3a" stroke="#a78bfa" stroke-width="2"/>
  <text x="500" y="342" fill="#c4b5fd" font-size="13" font-weight="bold" text-anchor="middle">Your</text>
  <text x="500" y="358" fill="#c4b5fd" font-size="13" font-weight="bold" text-anchor="middle">Division</text>

  <!-- Process nodes arranged in a circle (8 positions) -->
  <!-- 1. Design (top) -->
  <rect x="435" y="95" width="130" height="55" rx="6" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="500" y="117" fill="#c7d2fe" font-size="12" font-weight="bold" text-anchor="middle">1. Design</text>
  <text x="500" y="135" fill="#818cf8" font-size="9" text-anchor="middle">Event Storming</text>
  <line x1="500" y1="150" x2="500" y2="290" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arw)"/>

  <!-- 2. Planning (top-right) -->
  <rect x="680" y="140" width="130" height="55" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="745" y="162" fill="#bae6fd" font-size="12" font-weight="bold" text-anchor="middle">2. Planning</text>
  <text x="745" y="180" fill="#38bdf8" font-size="9" text-anchor="middle">Desk Inventory</text>
  <line x1="700" y1="195" x2="555" y2="315" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 3. Crafting (right) -->
  <rect x="740" y="295" width="130" height="55" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="805" y="317" fill="#bbf7d0" font-size="12" font-weight="bold" text-anchor="middle">3. Crafting</text>
  <text x="805" y="335" fill="#22c55e" font-size="9" text-anchor="middle">Code Generation</text>
  <line x1="740" y1="322" x2="560" y2="340" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 4. Refactoring (right-bottom) — shown as dashed, can enter anywhere -->
  <rect x="720" y="440" width="130" height="55" rx="6" fill="#1a0a1e" stroke="#c084fc" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="785" y="462" fill="#e9d5ff" font-size="12" font-weight="bold" text-anchor="middle">4. Refactor</text>
  <text x="785" y="480" fill="#c084fc" font-size="9" text-anchor="middle">Enter Anywhere</text>
  <line x1="720" y1="468" x2="560" y2="370" stroke="#c084fc" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- 5. Debugging (bottom-right) -->
  <rect x="640" y="540" width="130" height="55" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="2"/>
  <text x="705" y="562" fill="#fef3c7" font-size="12" font-weight="bold" text-anchor="middle">5. Debugging</text>
  <text x="705" y="580" fill="#f59e0b" font-size="9" text-anchor="middle">Test + Verify</text>
  <line x1="660" y1="540" x2="535" y2="405" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 6. Deployment (bottom) -->
  <rect x="435" y="580" width="130" height="55" rx="6" fill="#3b0a1e" stroke="#f43f5e" stroke-width="2"/>
  <text x="500" y="602" fill="#fecdd3" font-size="12" font-weight="bold" text-anchor="middle">6. Deploy</text>
  <text x="500" y="620" fill="#f43f5e" font-size="9" text-anchor="middle">Ship It</text>
  <line x1="500" y1="580" x2="500" y2="410" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 7. Monitoring (bottom-left) -->
  <rect x="230" y="540" width="130" height="55" rx="6" fill="#1c1917" stroke="#78716c" stroke-width="2"/>
  <text x="295" y="562" fill="#e7e5e4" font-size="12" font-weight="bold" text-anchor="middle">7. Monitor</text>
  <text x="295" y="580" fill="#a8a29e" font-size="9" text-anchor="middle">Health + SLAs</text>
  <line x1="340" y1="540" x2="470" y2="400" stroke="#a8a29e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 8. Rescue (left-bottom) -->
  <rect x="155" y="440" width="130" height="55" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="462" fill="#fecaca" font-size="12" font-weight="bold" text-anchor="middle">8. Rescue</text>
  <text x="220" y="480" fill="#ef4444" font-size="9" text-anchor="middle">Incident Response</text>
  <line x1="285" y1="462" x2="440" y2="365" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Outer cycle arrows (clockwise, connecting nodes) -->
  <!-- Design -> Planning -->
  <path d="M565,122 Q640,100 680,160" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arw-green)"/>
  <!-- Planning -> Crafting -->
  <path d="M800,195 Q830,240 850,295" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arw-green)"/>
  <!-- Crafting -> Debugging -->
  <path d="M840,350 Q840,440 770,540" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arw-green)"/>
  <!-- Debugging -> Deploy -->
  <path d="M640,575 Q580,600 565,600" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arw-green)"/>
  <!-- Deploy -> Monitor -->
  <path d="M435,610 Q380,610 360,580" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arw-green)"/>
  <!-- Monitor -> Rescue -->
  <path d="M240,540 Q210,510 230,495" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arw-green)"/>
  <!-- Rescue -> Design (the cycle restarts) -->
  <path d="M190,440 Q130,300 435,115" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arw-amber)"/>

  <!-- Cycle restart label -->
  <rect x="120" y="268" width="120" height="28" rx="4" fill="#422006" fill-opacity="0.8" stroke="#fbbf24" stroke-width="1"/>
  <text x="180" y="287" fill="#fde68a" font-size="10" font-weight="bold" text-anchor="middle">Cycle Restarts</text>

  <!-- Lifecycle protocol legend -->
  <rect x="30" y="80" width="200" height="115" rx="6" fill="#1e1e2e" stroke="#475569" stroke-width="1"/>
  <text x="130" y="100" fill="#e2e8f0" font-size="11" font-weight="bold" text-anchor="middle">Lifecycle Protocol</text>
  <text x="45" y="120" fill="#4ade80" font-size="10">open   &#x2192; active</text>
  <text x="45" y="138" fill="#fbbf24" font-size="10">shelve &#x2192; paused</text>
  <text x="45" y="156" fill="#38bdf8" font-size="10">resume &#x2192; active</text>
  <text x="45" y="174" fill="#f43f5e" font-size="10">conclude &#x2192; done</text>

  <!-- Decision cascade note -->
  <rect x="30" y="610" width="180" height="65" rx="4" fill="#1e1e2e" stroke="#475569" stroke-width="1"/>
  <text x="120" y="632" fill="#94a3b8" font-size="10" font-weight="bold" text-anchor="middle">Decision Cascade</text>
  <text x="120" y="650" fill="#64748b" font-size="9" text-anchor="middle">Each phase's output</text>
  <text x="120" y="664" fill="#64748b" font-size="9" text-anchor="middle">constrains the next</text>
</svg>