<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="monospace" font-size="13">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </radialGradient>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 z" fill="#818cf8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="#0f1117" rx="8"/>
  <rect x="0" y="0" width="1000" height="500" fill="url(#glow)" rx="8"/>

  <!-- Decorative orb -->
  <circle cx="500" cy="250" r="200" fill="url(#orb)"/>

  <!-- Title block -->
  <text x="500" y="80" fill="#e2e8f0" font-size="36" font-weight="bold" text-anchor="middle">Meet Martha</text>
  <text x="500" y="115" fill="#a78bfa" font-size="16" text-anchor="middle">Your AI-Powered Software Development Guide</text>
  <line x1="350" y1="130" x2="650" y2="130" stroke="#6366f1" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Three pillars -->
  <!-- Pillar 1: Vision -->
  <rect x="80" y="165" width="240" height="220" rx="8" fill="#1e1b3a" fill-opacity="0.8" stroke="#818cf8" stroke-width="1.5"/>
  <circle cx="200" cy="210" r="25" fill="#312e81" stroke="#a5b4fc" stroke-width="2"/>
  <text x="200" y="216" fill="#c7d2fe" font-size="22" text-anchor="middle">&#x1F52E;</text>
  <text x="200" y="260" fill="#c7d2fe" font-size="15" font-weight="bold" text-anchor="middle">Envision</text>
  <text x="200" y="282" fill="#818cf8" font-size="11" text-anchor="middle">AI-guided conversations</text>
  <text x="200" y="298" fill="#818cf8" font-size="11" text-anchor="middle">shape your vision into</text>
  <text x="200" y="314" fill="#818cf8" font-size="11" text-anchor="middle">bounded contexts and</text>
  <text x="200" y="330" fill="#818cf8" font-size="11" text-anchor="middle">domain events</text>
  <text x="200" y="360" fill="#6366f1" font-size="10" text-anchor="middle">Event Storming + Oracle Chat</text>

  <!-- Pillar 2: Build -->
  <rect x="380" y="165" width="240" height="220" rx="8" fill="#0a1e0e" fill-opacity="0.8" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="500" cy="210" r="25" fill="#052e16" stroke="#86efac" stroke-width="2"/>
  <text x="500" y="216" fill="#86efac" font-size="22" text-anchor="middle">&#x2699;</text>
  <text x="500" y="260" fill="#bbf7d0" font-size="15" font-weight="bold" text-anchor="middle">Build</text>
  <text x="500" y="282" fill="#4ade80" font-size="11" text-anchor="middle">8-process lifecycle:</text>
  <text x="500" y="298" fill="#4ade80" font-size="11" text-anchor="middle">design, plan, craft,</text>
  <text x="500" y="314" fill="#4ade80" font-size="11" text-anchor="middle">debug, deploy, monitor,</text>
  <text x="500" y="330" fill="#4ade80" font-size="11" text-anchor="middle">rescue, refactor</text>
  <text x="500" y="360" fill="#22c55e" font-size="10" text-anchor="middle">Process-Centric Development</text>

  <!-- Pillar 3: Evolve -->
  <rect x="680" y="165" width="240" height="220" rx="8" fill="#1a0a1e" fill-opacity="0.8" stroke="#f43f5e" stroke-width="1.5"/>
  <circle cx="800" cy="210" r="25" fill="#5c0a1e" stroke="#fda4af" stroke-width="2"/>
  <text x="800" y="216" fill="#fda4af" font-size="22" text-anchor="middle">&#x267B;</text>
  <text x="800" y="260" fill="#fecdd3" font-size="15" font-weight="bold" text-anchor="middle">Evolve</text>
  <text x="800" y="282" fill="#fb7185" font-size="11" text-anchor="middle">Continuous cycle:</text>
  <text x="800" y="298" fill="#fb7185" font-size="11" text-anchor="middle">every phase produces</text>
  <text x="800" y="314" fill="#fb7185" font-size="11" text-anchor="middle">facts that feed the</text>
  <text x="800" y="330" fill="#fb7185" font-size="11" text-anchor="middle">next phase forward</text>
  <text x="800" y="360" fill="#f43f5e" font-size="10" text-anchor="middle">Decision Cascade + Fact Flow</text>

  <!-- Connecting arrows between pillars -->
  <line x1="320" y1="275" x2="380" y2="275" stroke="#818cf8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="620" y1="275" x2="680" y2="275" stroke="#818cf8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Bottom tagline -->
  <text x="500" y="430" fill="#94a3b8" font-size="13" text-anchor="middle">Martha is to the Application Lifecycle what QuickBooks is to accounting</text>
  <text x="500" y="452" fill="#64748b" font-size="11" text-anchor="middle">the tool that implements the discipline</text>

  <!-- Bottom accent line -->
  <line x1="200" y1="475" x2="800" y2="475" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
</svg>